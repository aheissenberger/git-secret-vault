name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: git-secret-vault
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: git-secret-vault
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: git-secret-vault
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: git-secret-vault.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Compute checksum (unix)
        if: runner.os != 'Windows'
        run: |
          sha256sum target/${{ matrix.target }}/release/${{ matrix.binary }} \
            > target/${{ matrix.target }}/release/${{ matrix.binary }}.sha256
      - name: Compute checksum (windows)
        if: runner.os == 'Windows'
        run: |
          Get-FileHash target/${{ matrix.target }}/release/${{ matrix.binary }} -Algorithm SHA256 |
            Select-Object -ExpandProperty Hash |
            Out-File target/${{ matrix.target }}/release/${{ matrix.binary }}.sha256
        shell: pwsh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.binary }}
            target/${{ matrix.target }}/release/${{ matrix.binary }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Checkout repo (for cargo-cyclonedx)
        uses: actions/checkout@v4
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: '*.cdx.json'
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*
            *.cdx.json
          generate_release_notes: true

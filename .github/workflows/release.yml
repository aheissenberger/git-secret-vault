name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: git-secret-vault
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: git-secret-vault
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: git-secret-vault
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: git-secret-vault.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Sign binary (macOS Developer ID)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          : "${MACOS_CERTIFICATE_P12_BASE64:?Missing secret MACOS_CERTIFICATE_P12_BASE64}"
          : "${MACOS_CERTIFICATE_PASSWORD:?Missing secret MACOS_CERTIFICATE_PASSWORD}"
          : "${MACOS_KEYCHAIN_PASSWORD:?Missing secret MACOS_KEYCHAIN_PASSWORD}"
          : "${MACOS_SIGNING_IDENTITY:?Missing secret MACOS_SIGNING_IDENTITY}"

          CERT_PATH="$RUNNER_TEMP/macos-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/macos-signing.keychain-db"
          BINARY_PATH="target/${{ matrix.target }}/release/${{ matrix.binary }}"

          cleanup() {
            rm -f "$CERT_PATH"
            security delete-keychain "$KEYCHAIN_PATH" || true
          }
          trap cleanup EXIT

          python3 - <<'PY'
          import base64
          import os
          cert_data = os.environ["MACOS_CERTIFICATE_P12_BASE64"]
          cert_path = os.environ["RUNNER_TEMP"] + "/macos-signing-cert.p12"
          with open(cert_path, "wb") as cert_file:
              cert_file.write(base64.b64decode(cert_data))
          PY

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          codesign --force --sign "$MACOS_SIGNING_IDENTITY" --options runtime --timestamp "$BINARY_PATH"
          codesign --verify --verbose=2 "$BINARY_PATH"
          codesign --display --verbose=2 "$BINARY_PATH"
      - name: Compute checksum (unix)
        if: runner.os != 'Windows'
        run: |
          sha256sum target/${{ matrix.target }}/release/${{ matrix.binary }} \
            > target/${{ matrix.target }}/release/${{ matrix.binary }}.sha256
      - name: Compute checksum (windows)
        if: runner.os == 'Windows'
        run: |
          Get-FileHash target/${{ matrix.target }}/release/${{ matrix.binary }} -Algorithm SHA256 |
            Select-Object -ExpandProperty Hash |
            Out-File target/${{ matrix.target }}/release/${{ matrix.binary }}.sha256
        shell: pwsh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.binary }}
            target/${{ matrix.target }}/release/${{ matrix.binary }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Checkout repo (for cargo-cyclonedx)
        uses: actions/checkout@v4
      - name: Determine version
        id: version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${CARGO_VERSION}"
          fi
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${CARGO_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: '*.cdx.json'
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*
            *.cdx.json
          generate_release_notes: true

  publish-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: ver
        run: |
          V=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=${V}" >> "$GITHUB_OUTPUT"
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: Compute SHA256 per arch
        id: sha
        run: |
          SHA_AARCH64=$(sha256sum dist/git-secret-vault-aarch64-apple-darwin/git-secret-vault | awk '{print $1}')
          SHA_X86_MACOS=$(sha256sum dist/git-secret-vault-x86_64-apple-darwin/git-secret-vault | awk '{print $1}')
          SHA_X86_LINUX=$(sha256sum dist/git-secret-vault-x86_64-unknown-linux-gnu/git-secret-vault | awk '{print $1}')
          echo "aarch64=${SHA_AARCH64}" >> "$GITHUB_OUTPUT"
          echo "x86_macos=${SHA_X86_MACOS}" >> "$GITHUB_OUTPUT"
          echo "x86_linux=${SHA_X86_LINUX}" >> "$GITHUB_OUTPUT"
      - name: Update formula
        run: |
          python3 scripts/update-homebrew-formula.py \
            "${{ steps.ver.outputs.version }}" \
            "${{ steps.sha.outputs.aarch64 }}" \
            "${{ steps.sha.outputs.x86_macos }}" \
            "${{ steps.sha.outputs.x86_linux }}"
      - name: Push formula to tap repo
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          FORMULA_CONTENT=$(cat packaging/homebrew/git-secret-vault.rb)
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            /repos/OWNER/homebrew-git-secret-vault/contents/Formula/git-secret-vault.rb \
            -f message="Update git-secret-vault formula to v${{ steps.ver.outputs.version }}" \
            -f content="$(echo "${FORMULA_CONTENT}" | base64 -w0)" \
            -f sha="$(gh api /repos/OWNER/homebrew-git-secret-vault/contents/Formula/git-secret-vault.rb --jq .sha 2>/dev/null || echo '')" \
            || echo "::warning::Homebrew tap update skipped (tap repo not configured)"

